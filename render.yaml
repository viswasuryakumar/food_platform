services:
  # ── API Gateway ──
  - type: web
    name: api-gateway
    runtime: node
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: USER_SERVICE_URL
        fromService:
          name: user-service
          type: web
          property: url
      - key: RESTAURANT_SERVICE_URL
        fromService:
          name: restaurant-service
          type: web
          property: url
      - key: ORDER_SERVICE_URL
        fromService:
          name: order-service
          type: web
          property: url
      - key: PAYMENT_SERVICE_URL
        fromService:
          name: payment-service
          type: web
          property: url
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          name: notification-service
          type: web
          property: url

  # ── User Service ──
  - type: web
    name: user-service
    runtime: node
    rootDir: services/user-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Restaurant Service ──
  - type: web
    name: restaurant-service
    runtime: node
    rootDir: services/restaurant-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false

  # ── Order Service ──
  - type: web
    name: order-service
    runtime: node
    rootDir: services/order-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false

  # ── Payment Service ──
  - type: web
    name: payment-service
    runtime: node
    rootDir: services/payment-service
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: API_GATEWAY_URL
        fromService:
          name: api-gateway
          type: web
          property: url

  # ── Notification Service ──
  - type: web
    name: notification-service
    runtime: node
    rootDir: services/notification-service
    buildCommand: npm install
    startCommand: node index.js


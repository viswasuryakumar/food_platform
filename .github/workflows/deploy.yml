name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-api-gateway:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build and push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-user-service:latest
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,mode=max,scope=user-service

      - name: Build and push restaurant-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/restaurant-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-restaurant-service:latest
          cache-from: type=gha,scope=restaurant-service
          cache-to: type=gha,mode=max,scope=restaurant-service

      - name: Build and push order-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-order-service:latest
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,mode=max,scope=order-service

      - name: Build and push payment-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/payment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-payment-service:latest
          cache-from: type=gha,scope=payment-service
          cache-to: type=gha,mode=max,scope=payment-service

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-notification-service:latest
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/food-platform-frontend:latest
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /app/food_platform
            git pull origin main
            docker compose pull
            docker compose up -d
            docker image prune -f
